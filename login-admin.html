<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Podcast Universe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        h2 {
            margin-bottom: 30px;
            color: #333;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: #667eea;
        }
        .remember-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }
        .remember-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #5a67d8;
        }
        .error {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 10px;
        }
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login Admin</h2>
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="admin" autocomplete="off">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <div class="remember-group">
            <input type="checkbox" id="rememberMe" checked>
            <label for="rememberMe">Ingat saya (login lebih lama)</label>
        </div>
        <button id="loginBtn">Masuk</button>
        <div class="error" id="errorMsg"></div>
    </div>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <script>
        // ==================== KONFIGURASI ====================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWKCtF2W2IlImsD8C9dKp4Iv1Ns2804xdc_3bhbUJpVEowxyIKnSDjYP3iboHmCbsr-g/exec';
        const SETTINGS_CACHE_KEY = 'adminSettings';
        const CACHE_DURATION = 5 * 60 * 1000; // 5 menit

        // ==================== FUNGSI MENGAMBIL SETTINGS ====================
        async function fetchSettings(forceRefresh = false) {
            // Cek cache terlebih dahulu
            if (!forceRefresh) {
                try {
                    const cached = localStorage.getItem(SETTINGS_CACHE_KEY);
                    if (cached) {
                        const parsed = JSON.parse(cached);
                        if (Date.now() - parsed.timestamp < CACHE_DURATION) {
                            console.log('Menggunakan cache settings');
                            return parsed.data;
                        } else {
                            localStorage.removeItem(SETTINGS_CACHE_KEY);
                        }
                    }
                } catch (e) {
                    localStorage.removeItem(SETTINGS_CACHE_KEY);
                }
            }

            try {
                const res = await fetch(SCRIPT_URL + '?action=GET_SETTINGS&nocache=' + Date.now());
                if (!res.ok) throw new Error('Gagal mengambil data');
                const data = await res.json();
                if (!data.success) throw new Error('Respons tidak sukses');
                const settings = {};
                (data.settings || []).forEach(row => { if (row[0]) settings[row[0]] = row[1]; });

                // Simpan ke cache
                try {
                    localStorage.setItem(SETTINGS_CACHE_KEY, JSON.stringify({
                        timestamp: Date.now(),
                        data: settings
                    }));
                } catch (e) {
                    console.warn('Gagal menyimpan cache settings', e);
                }

                return settings;
            } catch (err) {
                console.error('fetchSettings error:', err);
                throw err;
            }
        }

        // ==================== FUNGSI LOGIN ====================
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMsg = document.getElementById('errorMsg');
            const loading = document.getElementById('loading');

            if (!username || !password) {
                errorMsg.innerText = 'Username dan password harus diisi';
                return;
            }

            errorMsg.innerText = '';
            loading.style.display = 'flex';

            try {
                const settings = await fetchSettings();
                const validUsername = settings.USERNAME_ADMIN || 'admin';
                const validPassword = settings.PASSWORD_ADMIN || 'labsiber2026';

                if (username === validUsername && password === validPassword) {
                    // Tentukan masa berlaku sesi
                    let expires;
                    if (rememberMe) {
                        expires = Date.now() + 30 * 24 * 60 * 60 * 1000; // 30 hari
                    } else {
                        expires = Date.now() + 8 * 60 * 60 * 1000; // 8 jam
                    }

                    const session = {
                        username: username,
                        loginTime: Date.now(),
                        expires: expires
                    };
                    localStorage.setItem('adminSession', JSON.stringify(session));
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.innerText = 'Username atau password salah';
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = 'Gagal terhubung ke server. Coba lagi.';
            } finally {
                loading.style.display = 'none';
            }
        }

        // Event listener
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('loginBtn').addEventListener('click', handleLogin);
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
        });
    </script>
</body>
</html>
